<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>ACE CAREER ALL｜エースキャリアオール</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{
--navy:#0F2C4C;--navy-light:#1A3F6B;--navy-dark:#091D33;
--gold:#D4AF37;--gold-light:#E2C566;--gold-dark:#B8942E;
--teal:#1A6B5C;--teal-light:#E8F4F0;
--bg:#F5F6FA;--card:#FFFFFF;
--text:#1A1A2E;--text-light:#6B7280;--text-muted:#9CA3AF;
--border:#E5E7EB;--border-light:#F0F1F3;
--red:#E74C3C;--red-bg:#FDECEC;
--orange:#F39C12;--orange-bg:#FFF5E0;
--green:#27AE60;--green-bg:#E8F8EE;
--blue:#3498DB;--blue-bg:#EBF5FB;
--shadow:0 1px 3px rgba(0,0,0,.06),0 2px 8px rgba(0,0,0,.04);
--shadow-lg:0 4px 16px rgba(0,0,0,.08),0 8px 28px rgba(0,0,0,.05);
--radius:8px;--radius-lg:12px;
}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.6}
.sidebar{position:fixed;left:0;top:0;bottom:0;width:240px;background:linear-gradient(180deg,var(--navy-dark) 0%,var(--navy) 100%);color:#fff;z-index:100;display:flex;flex-direction:column;overflow:hidden}
.sidebar-brand{padding:22px 20px 18px;border-bottom:1px solid rgba(255,255,255,.08)}
.sidebar-brand h1{font-size:14px;font-weight:700;letter-spacing:.5px;color:var(--gold)}
.sidebar-brand p{font-size:11px;color:rgba(255,255,255,.4);margin-top:4px;letter-spacing:1px}
.nav{flex:1;padding:16px 0;overflow-y:auto}
.nav-item{display:flex;align-items:center;padding:13px 24px;cursor:pointer;transition:all .25s;font-size:13px;gap:14px;color:rgba(255,255,255,.55);font-weight:400;border-left:3px solid transparent;letter-spacing:.3px}
.nav-item:hover{background:rgba(255,255,255,.04);color:rgba(255,255,255,.85)}
.nav-item.active{background:rgba(212,175,55,.12);color:var(--gold);border-left-color:var(--gold);font-weight:500}
.nav-item .icon{width:20px;text-align:center;font-size:15px;opacity:.8}
.nav-item .badge{margin-left:auto;background:var(--red);color:#fff;font-size:10px;padding:2px 8px;border-radius:10px;font-weight:700;min-width:20px;text-align:center}
.sidebar-footer{padding:16px 24px;border-top:1px solid rgba(255,255,255,.06);font-size:11px;color:rgba(255,255,255,.2)}
.main{margin-left:240px;min-height:100vh;overflow-x:hidden}
.topbar{background:var(--card);border-bottom:1px solid var(--border);padding:16px 32px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;backdrop-filter:blur(12px)}
.topbar-title{display:flex;align-items:center;gap:12px}
.topbar-title h2{font-size:15px;font-weight:600;color:var(--text)}
.topbar-right{display:flex;align-items:center;gap:20px}
.topbar-bell{position:relative;cursor:pointer;font-size:18px;padding:8px;border-radius:50%;transition:background .2s}
.topbar-bell:hover{background:var(--bg)}
.topbar-bell .dot{position:absolute;top:6px;right:6px;width:8px;height:8px;background:var(--red);border-radius:50%;border:2px solid var(--card)}
.topbar-user{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text-light)}
.topbar-user .avatar{width:30px;height:30px;border-radius:50%;background:var(--blue);display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:600}
.content{padding:28px 32px;max-width:1400px;overflow-x:hidden}
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:18px;margin-bottom:28px}
.kpi-card{background:var(--card);border-radius:var(--radius-lg);padding:22px 24px;box-shadow:var(--shadow);border:1px solid var(--border-light);position:relative;overflow:hidden;transition:transform .2s,box-shadow .2s}
.kpi-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg)}
.kpi-card::after{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.kpi-card.gold::after{background:var(--gold)}
.kpi-card.teal::after{background:var(--teal)}
.kpi-card.red::after{background:var(--red)}
.kpi-card.blue::after{background:var(--blue)}
.kpi-label{font-size:12px;color:var(--text-light);font-weight:500;letter-spacing:.5px;text-transform:uppercase}
.kpi-value{font-size:28px;font-weight:700;color:var(--text);margin:6px 0 3px;letter-spacing:-.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-family:'Inter','Noto Sans JP',sans-serif;font-variant-numeric:tabular-nums}
.kpi-sub{font-size:12px;color:var(--text-muted)}
.kpi-trend{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;padding:3px 8px;border-radius:6px;margin-top:6px}
.kpi-trend.up{background:var(--green-bg);color:var(--green)}
.kpi-trend.down{background:var(--red-bg);color:var(--red)}
.panel{background:var(--card);border-radius:var(--radius-lg);box-shadow:var(--shadow);border:1px solid var(--border-light);margin-bottom:24px;max-width:100%;overflow-x:auto;overflow-y:hidden}
.panel-header{padding:18px 24px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.panel-header h3{font-size:15px;font-weight:600;color:var(--navy);letter-spacing:.3px}
.panel-body{padding:20px 24px}
.table-wrap{width:100%;overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;min-width:600px}
th{padding:11px 14px;text-align:left;font-size:11px;color:var(--text-light);font-weight:600;text-transform:uppercase;letter-spacing:.6px;border-bottom:2px solid var(--border);background:var(--bg);white-space:nowrap}
td{padding:12px 14px;border-bottom:1px solid var(--border-light);font-size:13px;word-break:break-word}
tr:hover td{background:rgba(212,175,55,.02)}
.badge-s{display:inline-flex;align-items:center;gap:5px;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:600;letter-spacing:.3px;white-space:nowrap}
.badge-s::before{content:'';width:6px;height:6px;border-radius:50%;background:currentColor}
.badge-s.confirmed{background:var(--green-bg);color:var(--green)}
.badge-s.pending{background:var(--orange-bg);color:var(--orange)}
.badge-s.overdue{background:var(--red-bg);color:var(--red)}
.badge-s.info{background:var(--blue-bg);color:var(--blue)}
.badge-s.done{background:#F0F0F0;color:#888}
.btn{padding:9px 18px;border:none;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;transition:all .2s;display:inline-flex;align-items:center;gap:7px;font-family:inherit}
.btn-gold{background:linear-gradient(135deg,var(--gold) 0%,var(--gold-dark) 100%);color:#fff;box-shadow:0 2px 8px rgba(212,175,55,.25)}
.btn-gold:hover{box-shadow:0 4px 16px rgba(212,175,55,.35);transform:translateY(-1px)}
.btn-navy{background:var(--navy);color:#fff}
.btn-navy:hover{background:var(--navy-light)}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text-light)}
.btn-outline:hover{background:var(--bg);border-color:var(--text-muted)}
.btn-sm{padding:6px 12px;font-size:12px;border-radius:6px}
.btn-green{background:var(--green);color:#fff}
.btn-red-outline{background:transparent;border:1px solid var(--red);color:var(--red)}
.tabs{display:flex;gap:0;border-bottom:2px solid var(--border);margin-bottom:22px}
.tab{padding:11px 22px;cursor:pointer;font-size:13px;font-weight:500;color:var(--text-light);border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .2s;letter-spacing:.3px}
.tab.active{color:var(--gold);border-bottom-color:var(--gold);font-weight:600}
.tab:hover{color:var(--navy)}
.global-filter{display:flex;align-items:center;gap:10px;padding:10px 16px;background:var(--card);border:1px solid var(--border-light);border-radius:var(--radius);margin-bottom:20px;box-shadow:var(--shadow);flex-wrap:wrap}
.global-filter label{font-size:12px;font-weight:600;color:var(--text-light);letter-spacing:.3px;white-space:nowrap}
.filter-chip{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;transition:all .2s;border:1px solid var(--border);color:var(--text-light);background:transparent}
.filter-chip:hover{border-color:var(--gold);color:var(--gold)}
.filter-chip.active{background:var(--navy);color:var(--gold);border-color:var(--navy)}
.tl-item{display:flex;gap:14px;padding:14px 0;border-bottom:1px solid var(--border-light)}
.tl-item:last-child{border:none}
.tl-dot{width:8px;height:8px;border-radius:50%;background:var(--gold);margin-top:7px;flex-shrink:0}
.tl-content .tl-title{font-size:13px;font-weight:500;color:var(--text)}
.tl-content .tl-desc{font-size:12px;color:var(--text-light);margin-top:2px}
.tl-content .tl-time{font-size:11px;color:var(--text-muted);margin-top:3px}
.p-card{background:var(--card);border:1px solid var(--border-light);border-radius:var(--radius-lg);padding:20px;transition:all .25s;overflow:hidden}
.p-card:hover{box-shadow:var(--shadow-lg);transform:translateY(-2px)}
.p-card h4{font-family:'Noto Sans JP',sans-serif;font-size:15px;color:var(--navy);margin-bottom:10px;display:flex;align-items:center;gap:8px;word-break:break-word}
.p-card .meta{font-size:12px;color:var(--text-light);line-height:2;word-break:break-word}
.p-card .meta strong{color:var(--text);font-weight:500}
.progress{height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.progress .fill{height:100%;border-radius:3px;transition:width .8s ease}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px}
.alert-item{padding:16px 20px;border-left:4px solid;margin-bottom:10px;border-radius:0 var(--radius) var(--radius) 0;font-size:13px;transition:opacity .2s}
.alert-item.critical{border-color:var(--red);background:var(--red-bg)}
.alert-item.warning{border-color:var(--orange);background:var(--orange-bg)}
.alert-item.info{border-color:var(--blue);background:var(--blue-bg)}
.alert-item .a-title{font-weight:600;margin-bottom:3px;font-size:13px}
.alert-item .a-body{color:var(--text-light);font-size:12px}
.alert-item .a-time{font-size:11px;color:var(--text-muted);margin-top:6px}
.chat-wrap{display:flex;flex-direction:column;height:calc(100vh - 160px);background:var(--card);border-radius:var(--radius-lg);box-shadow:var(--shadow);border:1px solid var(--border-light);overflow:hidden}
.chat-msgs{flex:1;overflow-y:auto;padding:24px}
.chat-msg{display:flex;gap:12px;margin-bottom:18px;max-width:82%}
.chat-msg.user{margin-left:auto;flex-direction:row-reverse}
.chat-av{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.chat-msg.ai .chat-av{background:var(--navy);color:#fff}
.chat-msg.user .chat-av{background:var(--blue);color:#fff}
.chat-bubble{padding:14px 18px;border-radius:16px;font-size:13px;line-height:1.7;letter-spacing:.2px}
.chat-msg.ai .chat-bubble{background:var(--bg);border:1px solid var(--border-light);border-top-left-radius:4px;color:var(--text)}
.chat-msg.user .chat-bubble{background:var(--navy);color:#fff;border-top-right-radius:4px}
.chat-input-bar{padding:18px 24px;border-top:1px solid var(--border);display:flex;gap:10px;background:var(--bg)}
.chat-input-bar input{flex:1}
.form-control{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:8px;font-size:13px;font-family:inherit;transition:all .2s;background:var(--card);box-sizing:border-box}
.form-control:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px rgba(212,175,55,.12)}
.loading-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:20px}
.loading-spinner{width:48px;height:48px;border:4px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.sync-bar{display:flex;align-items:center;gap:12px;padding:8px 16px;background:var(--green-bg);border:1px solid rgba(39,174,96,.2);border-radius:var(--radius);margin-bottom:16px;font-size:12px;color:var(--green)}
.sync-bar.error{background:var(--red-bg);border-color:rgba(231,76,60,.2);color:var(--red)}
@media(max-width:900px){
.sidebar{width:56px}.sidebar-brand h1,.sidebar-brand p,.nav-item span:not(.icon),.nav-item .badge,.sidebar-footer{display:none}.nav-item{padding:14px 18px;justify-content:center}.main{margin-left:56px}
.kpi-grid{grid-template-columns:repeat(2,1fr)}.grid-2,.grid-3{grid-template-columns:1fr}.content{padding:20px 16px}
table{min-width:500px}.global-filter{flex-wrap:wrap}
}
@media(max-width:480px){.kpi-grid{grid-template-columns:1fr}.topbar{padding:12px 16px}.content{padding:16px 12px}
.kpi-value{font-size:22px}
}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{transform:translateY(8px);opacity:0}to{transform:translateY(0);opacity:1}}
.animate{animation:slideUp .35s ease-out}
</style>
</head>
<body>
<div id="app"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback}=React;

// ========== 設定 ==========
const SHEET_ID='1KRPoPo1bvYNTXj3-fotkKsurlpEXOURU';
const SHEETS={cases:'案件一覧',staff:'スタッフ',partners:'取引先'};

const BIZ=[
{id:'mobile',name:'携帯販売',color:'#D4AF37'},
{id:'fp',name:'FP委託',color:'#ED7D31'},
{id:'reform',name:'リフォーム',color:'#27AE60'},
{id:'realestate',name:'不動産',color:'#3498DB'},
{id:'gas',name:'ガス',color:'#9B59B6'},
{id:'hr',name:'人材紹介',color:'#E74C3C'},
];
const bizNameMap={mobile:'携帯販売',fp:'FP委託',reform:'リフォーム',realestate:'不動産',gas:'ガス',hr:'人材紹介'};
const bizIdMap={'携帯販売':'mobile','FP委託':'fp','リフォーム':'reform','不動産':'realestate','ガス':'gas','人材紹介':'hr'};

// ========== Google Sheets gviz データ取得 ==========
function gvizUrl(sheetName){
  return `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(sheetName)}`;
}

function parseGviz(text){
  const s=text.indexOf('{'),e=text.lastIndexOf('}');
  if(s<0||e<0)throw new Error('gviz parse error');
  return JSON.parse(text.substring(s,e+1));
}

// 列ヘッダーを自動検出してマッピング
function detectColumns(cols){
  const map={};
  cols.forEach((c,i)=>{
    const l=(c.label||'').toLowerCase();
    if(l.includes('日付'))map.date=i;
    else if(l.includes('事業部'))map.biz=i;
    else if(l.includes('案件名'))map.name=i;
    else if(l.includes('クライアント')||l.includes('発注元'))map.client=i;
    else if(l.includes('売上'))map.amount=i;
    else if(l.includes('交通費'))map.transport=i;
    else if(l.includes('稼働者'))map.person=i;
    else if(l.includes('所属')||l.includes('取引先')||l.includes('支払先'))map.belong=i;
    else if(l.includes('原価'))map.cost=i;
    else if(l.includes('粗利'))map.profit=i;
    else if(l.includes('ステータス'))map.status=i;
    else if(l.includes('請求月'))map.billMonth=i;
    else if(l.includes('支払期日'))map.payDue=i;
    else if(l.includes('備考'))map.notes=i;
  });
  return map;
}

function cellVal(row,idx){
  if(idx===undefined||idx===null)return null;
  const c=row.c?.[idx];
  return c?.v??null;
}
function cellStr(row,idx){return String(cellVal(row,idx)||'');}
function cellNum(row,idx){return parseFloat(cellVal(row,idx))||0;}

const statusMap={'確認済':'confirmed','未確認':'pending','進行中':'in_progress','完了':'confirmed'};

function parseCases(json){
  const cm=detectColumns(json.table.cols);
  return json.table.rows.filter(r=>cellStr(r,cm.name)).map((r,i)=>{
    const amount=cellNum(r,cm.amount);
    const cost=cellNum(r,cm.cost);
    const transport=cellNum(r,cm.transport);
    const rawStatus=cellStr(r,cm.status);
    return{
      id:i+1,
      date:cellStr(r,cm.date).slice(0,10),
      biz:bizIdMap[cellStr(r,cm.biz)]||'mobile',
      name:cellStr(r,cm.name),
      client:cellStr(r,cm.client),
      amount,
      transport,
      person:cellStr(r,cm.person),
      belong:cellStr(r,cm.belong),
      cost,
      profit:amount-cost-transport,
      status:statusMap[rawStatus]||'pending',
      billing:'not_entered',
      billMonth:cellStr(r,cm.billMonth).slice(0,7),
      payDue:cellStr(r,cm.payDue).slice(0,10),
      notes:cellStr(r,cm.notes),
    };
  });
}

function parseStaff(json){
  const cols=json.table.cols;
  return json.table.rows.filter(r=>cellStr(r,0)).map((r,i)=>({
    id:i+1,
    name:cellStr(r,0),
    dept:cellStr(r,1),
    rate:cellNum(r,2),
    incentive:cellNum(r,3),
    type:cellStr(r,4),
    belong:cellStr(r,4).includes('自社')?'自社':cellStr(r,1),
    contact:cellStr(r,5),
  }));
}

function parsePartners(json){
  const cols=json.table.cols;
  const clients=[];const partners=[];
  json.table.rows.filter(r=>cellStr(r,0)).forEach((r,i)=>{
    const entry={
      id:i+1,
      name:cellStr(r,0),
      dept:cellStr(r,1),
      terms:cellStr(r,2),
      rate:cellStr(r,3),
      contact:cellStr(r,4),
      note:cellStr(r,5),
      category:cellStr(r,6),
    };
    if(cellStr(r,6).includes('パートナー'))partners.push(entry);
    else clients.push(entry);
  });
  return{clients,partners};
}

// ========== メインアプリ ==========
function App(){
const[page,setPage]=useState('dashboard');
const[cases,setCases]=useState([]);
const[clients,setClients]=useState([]);
const[partners,setPartners]=useState([]);
const[staff,setStaff]=useState([]);
const[alerts,setAlerts]=useState([]);
const[chatMsgs,setChatMsgs]=useState([{role:'ai',text:'エースキャリアオール AIアシスタントです。\n\nスプレッドシートから自動読み込みされたデータに基づいて回答します。\n\n質問例：\n・「今月の請求対象を教えて」\n・「支払いスケジュール」\n・「自社 vs パートナー」\n・「売上サマリー」'}]);
const[bizFilter,setBizFilter]=useState('all');
const[loading,setLoading]=useState(true);
const[syncTime,setSyncTime]=useState(null);
const[syncError,setSyncError]=useState(null);
const[hasTransport,setHasTransport]=useState(false);

// データ読み込み
const loadData=useCallback(()=>{
  setLoading(true);setSyncError(null);
  const base=gvizUrl(SHEETS.cases);
  const staffUrl=gvizUrl(SHEETS.staff);
  const partnerUrl=gvizUrl(SHEETS.partners);

  Promise.all([
    fetch(base).then(r=>r.text()).then(parseGviz),
    fetch(staffUrl).then(r=>r.text()).then(parseGviz),
    fetch(partnerUrl).then(r=>r.text()).then(parseGviz),
  ]).then(([cJson,sJson,pJson])=>{
    const parsedCases=parseCases(cJson);
    setCases(parsedCases);
    setStaff(parseStaff(sJson));
    const{clients:cl,partners:pt}=parsePartners(pJson);
    setClients(cl);setPartners(pt);

    // 交通費列の有無を検出
    const cm=detectColumns(cJson.table.cols);
    setHasTransport(cm.transport!==undefined);

    // アラート自動生成
    const now=new Date();
    const newAlerts=[];
    parsedCases.forEach(c=>{
      if(c.payDue){
        const d=Math.ceil((new Date(c.payDue)-now)/(864e5));
        if(d<=7&&d>=0)newAlerts.push({id:'pay-'+c.id,type:'warning',title:'支払い期日が近づいています',msg:`${c.name}（¥${c.cost.toLocaleString()}）→ 期日: ${c.payDue}`,time:'自動検出',read:false});
      }
      if(c.status==='pending')newAlerts.push({id:'pend-'+c.id,type:'info',title:'未確認案件',msg:`${c.name} が未確認です`,time:'自動検出',read:false});
    });
    setAlerts(newAlerts);
    setSyncTime(new Date().toLocaleTimeString('ja-JP'));
    setLoading(false);
  }).catch(err=>{
    console.error('データ読み込みエラー:',err);
    setSyncError('スプレッドシートの読み込みに失敗しました。共有設定を確認してください。');
    setLoading(false);
  });
},[]);

function Dashboard({cases,allCases,alerts,setPage,bizFilter,hasTransport}){

return<>

<div className="grid-2">

<span style={{display:'inline-block',width:10,height:10,borderRadius:3,background:b.color,flexShrink:0}}/><span style={{flex:1,fontSize:13}}>{b.name}</span>
<span style={{fontWeight:700,fontFamily:"'Inter','Noto Sans JP',sans-serif",fontSize:13}}>¥{bt.toLocaleString()}</span>
<div className="progress" style={{width:80}}><div className="fill" style={{width:`${gt>0?bt/gt*100:0}%`,background:b.color}}/></div>

</>}

{tab==='cal'&&<div className="panel"><div className="panel-header"><h3>月次 請求・支払いタイムライン</h3></div><div className="panel-body">
{[{d:'毎月15日',e:'ガス販売代理店C社 締日',t:'info'},{d:'毎月25日',e:'クライアント向け：請求対象案件を集計→請求書（案）自動生成',t:'warning'},{d:'毎月28日',e:'事務員が請求書を確認・修正',t:'warning'},{d:'毎月30日',e:'クライアントへ請求書を確定・送付',t:'critical'},{d:'毎月末',e:'パートナーからの請求書を確認・支払い計画書作成',t:'critical'},{d:'支払日5日前',e:'パートナーへの振込予約アラート自動送信',t:'critical'}].map((i,idx)=><div className={`alert-item ${i.t}`} key={idx}><div className="a-title">{i.d}</div><div className="a-body">{i.e}</div></div>)}
</div></div>}
</>;
}

// ============ AI CHAT ============
function AIPage({msgs,setMsgs,cases,clients,partners,staff,hasTransport}){
const[input,setInput]=useState('');
const ref=useRef();
useEffect(()=>{ref.current&&(ref.current.scrollTop=ref.current.scrollHeight)},[msgs]);

function ai(text){
const t=text.toLowerCase();
if(t.includes('請求')&&(t.includes('今月')||t.includes('対象'))){
const now2=new Date();const curM=`${now2.getFullYear()}-${String(now2.getMonth()+1).padStart(2,'0')}`;const m3=cases.filter(c=>c.billMonth===curM);const tot=m3.reduce((s,c)=>s+c.amount,0);const pend=m3.filter(c=>c.status!=='confirmed');
return`📋 ${curM.slice(0,4)}年${curM.slice(5)}月の請求対象\n\n対象案件: ${m3.length}件\n合計金額: ¥${tot.toLocaleString()}\n\n【未確認 ${pend.length}件】\n${pend.map(c=>`・${c.name}（¥${c.amount.toLocaleString()}）→ クライアント: ${c.client||'-'}`).join('\n')}\n\n⚠️ 月末までに請求書発行が必要です。`}
if(t.includes('単価')||t.includes('いくら')||t.includes('時給')){
const allOrgs=[...clients.map(c=>({...c,orgType:'クライアント'})),...partners.map(p=>({...p,orgType:'パートナー'}))];
const matched=allOrgs.filter(p=>text.includes(p.name)||(t.includes('ファースト')&&p.name.includes('ファースト'))||(t.includes('リフォーム')&&p.name.includes('リフォーム'))||(t.includes('ガス')&&p.name.includes('ガス')));
if(matched.length)return matched.map(p=>`🔍 ${p.name}（${p.orgType}）\n・単価: ${p.rate}\n・請求条件: ${p.terms}\n・先方担当: ${p.contact}`).join('\n\n');
return`🔍 該当する取引先が見つかりません。\n\n【クライアント】\n${clients.map(c=>`・${c.name}（${c.rate}）`).join('\n')}\n\n【パートナー】\n${partners.map(p=>`・${p.name}（${p.rate}）`).join('\n')}`}
if(t.includes('スタッフ')||t.includes('staff')||t.includes('稼働者')){
return`👤 稼働者一覧\n\n${staff.map(s=>`・${s.name}（${s.dept}）${s.type} ${s.rate>0?'時給¥'+s.rate.toLocaleString():''}`).join('\n')}`}
if(t.includes('支払')||t.includes('振込')){
return`💰 支払いスケジュール\n\n${cases.filter(c=>c.payDue).sort((a,b)=>a.payDue.localeCompare(b.payDue)).map(c=>{const d=Math.ceil((new Date(c.payDue)-new Date())/(864e5));return`・${c.payDue} | ${c.name} | ¥${c.cost.toLocaleString()} → ${c.belong||'-'} | ${d<=7?'⚠️要対応':'予定'}`}).join('\n')}`}
if(t.includes('売上')||t.includes('合計')||t.includes('サマリー')){
const gt=cases.reduce((s,c)=>s+c.amount,0);const gc=cases.reduce((s,c)=>s+c.cost+(c.transport||0),0);
const selfC=cases.filter(c=>(c.belong||'').includes('自社'));const ptC=cases.filter(c=>c.belong&&!(c.belong||'').includes('自社'));
return`📊 売上サマリー\n\n全案件: ${cases.length}件\n売上合計: ¥${gt.toLocaleString()}\n原価合計: ¥${gc.toLocaleString()}\n粗利合計: ¥${(gt-gc).toLocaleString()}\n粗利率: ${gt>0?((gt-gc)/gt*100).toFixed(1):0}%\n\n【内訳】\n自社稼�n: ${selfC.length}件（売上¥${selfC.reduce((s,c)=>s+c.amount,0).toLocaleString()}）\nパートナー稼働: ${ptC.length}件（売上¥${ptC.reduce((s,c)=>s+c.amount,0).toLocaleString()}）`}
if((t.includes('自社')&&t.includes('パートナー'))||t.includes('内訳')||t.includes('所属')){
const selfC=cases.filter(c=>(c.belong||'').includes('自社'));const ptC=cases.filter(c=>c.belong&&!(c.belong||'').includes('自社'));
const selfRev=selfC.reduce((s,c)=>s+c.amount,0);const ptRev=ptC.reduce((s,c)=>s+c.amount,0);const ptCost=ptC.reduce((s,c)=>s+c.cost+(c.transport||0),0);
return`📊 自社 vs パートナー 内訳\n\n【自社スタッフ稼働> �{selfC.length}件\n売上: ¥${selfRev.toLocaleString()}\n原価: ¥0（自社のため）\n粗利: ¥${selfRev.toLocaleString()}\n\n【パートナー片働^{$ptC.length}件\n売上: ¥${ptRev.toLocaleString()}\n原価: ¥${ptCost.toLocaleString()}\n粗利: ¥${(ptRev-ptCost).toLocaleString()}\n\n${ptC.map(c=>`・${c.name} → ${c.belong}（稼働者:${c.person}）`).join('\n')}`}
return`ご質問を理解しました。以下をお試しください：\n\n・「今月の請求対象を教えて」\n・「ファーストプロジェクトの単価は？」\n・「支払いスケジュール」\n・「売上サマリー」\n・「自社 vs パートナー」\n・「稼働者一覧」`}

function send(){if(!input.trim())return;const u=input.trim();setMsgs(p=>[...p,{role:'user',text:u}]);setInput('');setTimeout(()=>setMsgs(p=>[...p,{role:'ai',text:ai(u)}]),400)}

return<div className="chat-wrap"><div className="chat-msgs" ref={ref}>{msgs.map((m,i)=><div key={i} className={`chat-msg ${m.role}`}><div className="chat-av">{m.role==='ai'?'🤖':'👤'}</div><div className="chat-bubble" style={{whiteSpace:'pre-wrap'}}>{m.text}</div></div>)}</div>
<div className="chat-input-bar"><input className="form-control" placeholder="質問を入力..." value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==='Enter'&&send()}/><button className="btn btn-gold" onClick={send}>送信</button></div></div>;
}

// ============ ALERTS ============
function AlertsPage({alerts,setAlerts}){
return<><div style={{display:'flex',justifyContent:'space-between',marginBottom:18}}><span style={{fontSize:13,color:'var(--text-light)'}}>未読: {alerts.filter(a=>!a.read).length}件</span><button className="btn btn-outline btn-sm" onClick={()=>setAlerts(p=>p.map(a=>({...a,read:true})))}>全て既読</button></div>
{alerts.length?alerts.map(a=><div key={a.id} className={`alert-item ${a.type}`} style={{opacity:a.read?.5:1,cursor:'pointer'}} onClick={()=>setAlerts(p=>p.map(x=>x.id===a.id?{...x,read:true}:x))}><div className="a-title">{a.read?'':'🔴 '}{a.title}</div><div className="a-body">{a.msg}</div><div className="a-time">{a.time}{a.read?' ✓旤読':''}</div></div>):<EmptyState icon="🔔" title="アラートなし" sub="新しいアラートが発生するとここに表示されます"/>}
</>;
}

// ============ REPORTS ============
function ReportsPage({cases,hasTransport}){
if(!cases.length)return<EmptyState icon="📈" title="該当するレポートデータなし" sub="事業部フィルターを変更してください"/>;
const byP={};cases.forEach(c=>{const k=c.person||'未設定';if(!byP[k])byP[k]={t:0,n:0,cost:0,belong:c.belong||'-'};byP[k].t+=c.amount;byP[k].cost+=(c.cost||0)+(c.transport||0);byP[k].n++});
const byB={};cases.forEach(c=>{if(!byB[c.biz])byB[c.biz]={t:0,n:0,cost:0};byB[c.biz].t+=c.amount;byB[c.biz].cost+=(c.cost||0)+(c.transport||0);byB[c.biz].n++});
const gt=cases.reduce((s,c)=>s+c.amount,0);
const gc=cases.reduce((s,c)=>s+(c.cost||0)+(c.transport||0),0);

// 自社 vs パートナー
const selfC=cases.filter(c=>(c.belong||'').includes('自社'));
const ptC=cases.filter(c=>c.belong&&!(c.belong||'').includes('自社'));
const selfRev=selfC.reduce((s,c)=>s+c.amount,0);
const ptRev=ptC.reduce((s,c)=>s+c.amount,0);
const ptCost=ptC.reduce((s,c)=>s+(c.cost||0)+(c.transport||0),0);

return<><div className="kpi-grid" style={{gridTemplateColumns:'repeat(3,1fr)'}}>
<div className="kpi-card gold"><div className="kpi-label">売上合計</div><div className="kpi-value" style={{fontSize:26}}>¥{gt.toLocaleString()}</div><div className="kpi-sub">{cases.length}件 | 粗利 ¥{(gt-gc).toLocaleString()}</div></div>
<div className="kpi-card teal"><div className="kpi-label">粗利率</div><div className="kpi-value" style={{fontSize:26}}>{gt>0?((gt-gc)/gt*100).toFixed(1):0}<span style={{fontSize:14}}>%</span></div><div className="progress" style={{marginTop:8}}><div className="fill" style={{width:`${gt>0?(gt-gc)/gt*100:0}%`,background:'var(--gold)'}}/></div></div>
<div className="kpi-card blue"><div className="kpi-label">自社 / パートナー</div><div className="kpi-value" style={{fontSize:22}}>{selfC.length}<span style={{fontSize:14}}>件</span><span style={{fontSize:16,color:'var(--text-muted)',margin:'0 6px'}}>/</span>{ptC.length}<span style={{fontSize:14}}>件</span></div><div className="kpi-sub">自社粗利¥{selfRev.toLocaleString()} / パートナー粗利¥{(ptRev-ptCost).toLocaleString()}</div></div>
</div>
<div className="grid-2">
<div className="panel"><div className="panel-header"><h3>👤 稼働者別</h3></div><table><thead><tr><th>稼働者</th><th>所属</th><th>案件数</th><th>売上合計</th><th>粗利</th><th>構成比</th></tr></thead><tbody>
{Object.entries(byP).map(([n,d])=><tr key={n}><td style={{fontWeight:600}}>{n}</td><td><span className={`badge-s ${d.belong.includes('自社')?'confirmed':'info'}`}>{d.belong}</span></td><td>{d.n}件</td><td style={{fontWeight:700,fontFamily:"'Inter','Noto Sans JP',sans-serif"}}>¥{d.t.toLocaleString()}</td><td style={{color:'var(--green)',fontFamily:"'Inter','Noto Sans JP',sans-serif"}}>¥{(d.t-d.cost).toLocaleString()}</td><td><div style={{display:'flex',alignItems:'center',gap:8}}><div className="progress" style={{width:80}}><div className="fill" style={{width:`${gt>0?d.t/gt*100:0}%`,background:'var(--gold)'}}/></div><span style={{fontSize:12}}>{gt>0?(d.t/gt*100).toFixed(1):0}%</span></div></td></tr>)}
</tbody></table></div>
<div className="panel"><div className="panel-header"><h3>📊 事業部別</h3></div><table><thead><tr><th>事業部</th><th>案件数</th><th>売上合計</th><th>粗利</th><th>構成比</th></tr></thead><tbody>
{Object.entries(byB).sort((a,b)=>b[1].t-a[1].t).map(([k,d])=>{const b=BIZ.find(x=>x.id===k);return<tr key={k}><td><span style={{display:'inline-block',width:10,height:10,borderRadius:3,background:b?.color,marginRight:8}}/>{b?.name}</td><td>{d.n}件</td><td style={{fontWeight:700,fontFamily:"'Inter','Noto Sans JP',sans-serif"}}>¥{d.t.toLocaleString()}</td><td style={{color:'var(--green)',fontFamily:"'Inter','Noto Sans JP',sans-serif"}}>¥{(d.t-d.cost).toLocaleString()}</td><td><div style={{display:'flex',alignItems:'center',gap:8}}><div className="progress" style={{width:80}}><div className="fill" style={{width:`${gt>0?d.t/gt*100:0}%`,background:b?.color}}/></div><span style={{fontSize:12}}>{gt>0?(d.t/gt*100).toFixed(1):0}%</span></div></td></tr>})}
</tbody></table></div>
</div></>;
}

ReactDOM.createRoot(document.getElementById('app')).render(<App/>);
</script>
</body>
</html>
